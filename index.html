<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historias Contadas | Player</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <!-- Capas de Fondo Premium -->
    <div id="bg-dynamic" class="bg-dynamic"></div>
    <div class="bg-overlay"></div>

    <!-- Este panel se rellenará dinámicamente con JS leyendo Firebase -->
    <main class="player-container" id="app-container">
        <!-- Logo del Cliente (se actualizará dinámicamente) -->
        <header class="client-header">
            <img src="" alt="Client Logo" id="client-logo" class="logo hidden">
        </header>

        <!-- Imagen de la Historia -->
        <div class="story-image-wrapper" id="story-image-wrapper" style="display:none;">
            <img id="story-image" class="story-image" alt="Imagen de la historia">
        </div>

        <!-- Información de la Historia -->
        <section class="story-info">
            <h1 id="story-title">Cargando Historia...</h1>
            <p id="client-name" class="subtitle"></p>
        </section>

        <!-- Selector de Idiomas -->
        <div class="lang-selector">
            <button id="btn-lang-es" class="lang-btn active">ES</button>
            <button id="btn-lang-en" class="lang-btn">EN</button>
        </div>

        <!-- Reproductor de Audio Visual -->
        <div id="audio-player-wrapper" class="audio-player-wrapper">
            <!-- Audio Tag (Oculto) -->
            <audio id="audio-element" preload="metadata"></audio>
            
            <div class="custom-player">
                <button id="play-pause-btn" class="play-btn">
                    <!-- Icono SVG Play -->
                    <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor" width="32" height="32"><path d="M8 5v14l11-7z"/></svg>
                    <!-- Icono SVG Pause -->
                    <svg id="icon-pause" class="hidden" viewBox="0 0 24 24" fill="currentColor" width="32" height="32"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <div class="timeline-container" id="timeline">
                    <div class="timeline-progress" id="progress-bar"></div>
                    <!-- Controlador para arrastrar -->
                    <div class="timeline-thumb" id="progress-thumb"></div>
                </div>
                <div class="time-displays">
                    <span id="current-time">0:00</span>
                    <span id="duration-time">0:00</span>
                </div>
            </div>
        </div>

        <!-- Visualizador de PDF -->
        <div id="pdf-player-wrapper" class="pdf-player-wrapper hidden">
            <div class="pdf-container">
                <div class="pdf-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="48" height="48">
                        <path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8.5 7.5c0 .83-.67 1.5-1.5 1.5H9v2H7.5V7H10c.83 0 1.5.67 1.5 1.5v1zm5 2c0 .83-.67 1.5-1.5 1.5h-2.5V7H15c.83 0 1.5.67 1.5 1.5v3zm4-3H19v1h1.5V11H19v2h-1.5V7h3v1.5zM9 9h1v1H9V9zm5.5 1h1v2h-1v-2zM2 6v14c0 1.1.9 2 2 2h14v-1.5H4V6H2z"/>
                    </svg>
                </div>
                <div class="pdf-actions">
                    <a id="btn-view-pdf" href="" target="_blank" class="btn-main">Leer Documento</a>
                    <a id="btn-download-pdf" href="" download class="btn-outline" style="margin-top: 1rem; width: 100%; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px;">💾 Descargar PDF</a>
                </div>
            </div>
        </div>

        <!-- Transcripción -->
        <div class="transcription-wrapper" id="transcription-wrapper" style="display:none;">
            <button id="btn-toggle-transcription" class="btn-transcription">
                📄 Ver Transcripción
            </button>
            <div id="transcription-content" class="transcription-content hidden">
                <p id="transcription-text"></p>
            </div>
        </div>

        <!-- Pie de Página: Logos y Créditos -->
        <footer class="player-footer">
            <div id="footer-logos-container" class="footer-logos hidden">
                <img id="footer-logos-img" src="" alt="Sponsors">
            </div>
            <div class="footer-credits">
                <p>&copy; <span id="current-year"></span> Musaraña</p>
            </div>
        </footer>
    </main>

    <!-- Cargador de Supabase y Lógica -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
