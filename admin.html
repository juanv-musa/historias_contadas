<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor | Musaraña Gestión de Museos</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- QRCode JS CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            /* Palette Musaraña */
            --primary: #8CC63F;
            --primary-hover: #7EAD36;
            --bg-page: #F3F4F6;
            --bg-surface: rgba(255, 255, 255, 0.85); /* Glassmorphism */
            --text-primary: #111827;
            --text-secondary: #4B5563;
            --danger: #EF4444;
            --border: rgba(229, 231, 235, 0.7);
            
            /* Effects */
            --shadow-glass: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
            --radius-xl: 1.5rem;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Background Blobs (Efecto corporativo Musaraña) */
        .background-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: linear-gradient(135deg, #f0f4fd 0%, #f6fdfa 100%);
        }

        .blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.5;
            border-radius: 50%;
            animation: float 20s infinite ease-in-out alternate;
        }

        .blob-1 {
            top: -10%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(140,198,63,0.3) 0%, rgba(140,198,63,0) 70%);
        }

        .blob-2 {
            bottom: -10%;
            left: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(189,191,193,0.3) 0%, rgba(189,191,193,0) 70%);
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-50px, 50px) scale(1.1); }
        }

        .container {
            flex: 1;
            padding: 2rem;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            position: relative;
        }

        /* Header Musaraña */
        header {
            padding: 2.5rem 0;
            text-align: center;
        }

        .header-logo-img {
            max-height: 70px;
            width: auto;
            margin-bottom: 0.5rem;
        }

        /* Glass Cards */
        .glass-panel {
            background: var(--bg-surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 2.5rem;
            box-shadow: var(--shadow-glass);
            margin-bottom: 2rem;
        }

        h2, h3, h4 {
            margin-bottom: 1.5rem;
            color: var(--text-primary);
            font-weight: 700;
        }

        /* Forms */
        .form-group { margin-bottom: 1.5rem; }
        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .form-control {
            width: 100%;
            background: white;
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 0.8rem 1rem;
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(140, 198, 63, 0.1);
        }

        /* Buttons */
        .btn {
            font-weight: 600;
            padding: 0.8rem 1.5rem;
            border-radius: 0.75rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-outline {
            background: white;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .btn-outline:hover {
            background: var(--bg-page);
        }

        .btn-danger {
            background: #fff;
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        /* Items */
        .item-list { list-style: none; }
        .item-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.25rem;
            margin-bottom: 1rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .item-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-glass);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
            .container { padding: 1rem; }
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            background: white;
        }

        .hidden { display: none !important; }

        /* Edición */
        .edit-container {
            background: #f8fafc;
            padding: 2rem;
            border-radius: 1.25rem;
            margin-top: 1.5rem;
            border: 1px solid var(--border);
            width: 100%;
        }

        .project-color-preview {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header>
        <!-- Cargando el logo real encontrado en la carpeta assets -->
        <img src="assets/logo%20MUSA%202021%20C.png" alt="Musaraña Gestión" class="header-logo-img" onerror="this.src='https://via.placeholder.com/200x70?text=MUSARAÑA'">
    </header>

    <div class="container" id="admin-app">
        
        <!-- Login View -->
        <div id="login-view" class="glass-panel admin-view">
            <h2 class="text-center" style="text-align: center;">Acceso al Gestor</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" class="form-control" placeholder="admin@musarana.com" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Entrar</button>
                <p id="auth-error" style="color: var(--danger); margin-top:1.5rem; text-align:center; font-size:0.9rem;" class="hidden"></p>
            </form>
        </div>

        <!-- Projects View -->
        <div id="projects-view" class="admin-view hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem;">
                <h2>Proyectos y Clientes</h2>
                <button id="btn-logout" class="btn btn-danger">Cerrar Sesión</button>
            </div>

            <div class="glass-panel">
                <h3>+ Crear Nuevo Proyecto</h3>
                <form id="create-project-form">
                    <div style="display:flex; gap: 1rem; align-items: flex-end;">
                        <div class="form-group" style="flex:1; margin:0;">
                            <label>Nombre del Proyecto</label>
                            <input type="text" id="new-project-name" class="form-control" required placeholder="Nombre del cliente o proyecto...">
                        </div>
                        <button type="submit" class="btn btn-primary" id="btn-create-project">Crear</button>
                    </div>
                </form>
            </div>

            <ul id="projects-list" class="item-list">
                <!-- Se llena con JS -->
            </ul>
        </div>

        <!-- Project Detail View -->
        <div id="project-detail-view" class="admin-view hidden">
            <div style="display:flex; align-items:center; justify-content: space-between; margin-bottom: 2.5rem;">
                <div style="display:flex; align-items:center; gap: 1.5rem;">
                    <button id="btn-back-projects" class="btn btn-outline">← Volver</button>
                    <h2 id="current-project-title" style="margin:0;">Proyecto</h2>
                </div>
            </div>

            <div class="grid-2">
                <!-- Brand Config -->
                <div class="glass-panel">
                    <h3>Identidad Visual</h3>
                    <form id="brand-form">
                        <div class="form-group">
                            <label>Nombre de Marca</label>
                            <input type="text" id="client-name-input" class="form-control" required>
                        </div>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div class="form-group">
                                <label>Color Marca</label>
                                <input type="color" id="client-color-input" class="form-control" style="height: 50px; padding: 5px;">
                            </div>
                            <div class="form-group">
                                <label>Color Fondo</label>
                                <input type="color" id="client-bg-input" class="form-control" style="height: 50px; padding: 5px;">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Logo (PNG/JPG)</label>
                            <input type="file" id="client-logo-input" class="form-control" accept="image/*">
                        </div>
                        <img id="logo-preview" class="hidden" style="max-height: 40px; margin-bottom: 1.5rem; border-radius: 8px;" />
                        
                        <div class="form-group">
                            <label>Logos Patrocinadores</label>
                            <input type="file" id="footer-logos-input" class="form-control" accept="image/*">
                        </div>
                        <img id="footer-logos-preview" class="hidden" style="max-height: 40px; margin-bottom: 1.5rem; border-radius: 8px;" />

                        <button type="submit" id="btn-save-brand" class="btn btn-primary" style="width: 100%;">Guardar Cambios</button>
                    </form>
                </div>

                <!-- Story Upload -->
                <div class="glass-panel">
                    <h3>Subir Contenido</h3>
                    <form id="story-form">
                        <div class="form-group">
                            <label>Título (Español)</label>
                            <input type="text" id="story-title-input" class="form-control" placeholder="Título para QR..." required>
                        </div>
                        <div class="form-group">
                            <label>Título (Inglés)</label>
                            <input type="text" id="story-title-en-input" class="form-control" placeholder="Title for English version...">
                        </div>
                        <div class="grid-2" style="gap: 1rem; margin-bottom: 1.5rem;">
                            <div class="form-group" style="margin:0;">
                                <label>Tipo de Contenido</label>
                                <select id="story-type-input" class="form-control">
                                    <option value="audio">🎵 Audio MP3</option>
                                    <option value="pdf">📄 Documento PDF</option>
                                </select>
                            </div>
                            <div class="form-group" style="margin:0;">
                                <label>URL Corta (Slug)</label>
                                <input type="text" id="story-slug-input" class="form-control" placeholder="ej: castellar01">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Foto de Portada</label>
                            <input type="file" id="story-image-input" class="form-control" accept="image/*">
                        </div>
                        
                        <div id="fields-audio">
                            <div class="grid-2" style="gap: 10px;">
                                <div class="form-group">
                                    <label>Audio ES</label>
                                    <input type="file" id="story-es-input" class="form-control" accept="audio/*">
                                </div>
                                <div class="form-group">
                                    <label>Audio EN</label>
                                    <input type="file" id="story-en-input" class="form-control" accept="audio/*">
                                </div>
                            </div>
                        </div>

                        <div id="fields-pdf" class="hidden">
                            <div class="grid-2" style="gap: 10px;">
                                <div class="form-group">
                                    <label>PDF ES</label>
                                    <input type="file" id="story-pdf-es-input" class="form-control" accept="application/pdf">
                                </div>
                                <div class="form-group">
                                    <label>PDF EN</label>
                                    <input type="file" id="story-pdf-en-input" class="form-control" accept="application/pdf">
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Transcripciones</label>
                            <textarea id="story-transcription-es" class="form-control" rows="2" placeholder="Texto en español..." style="margin-bottom: 0.5rem;"></textarea>
                            <textarea id="story-transcription-en" class="form-control" rows="2" placeholder="Text in English..."></textarea>
                        </div>
                        
                        <button type="submit" id="btn-upload-story" class="btn btn-primary" style="width: 100%;">Subir Historia</button>
                    </form>
                </div>
            </div>

            <div class="glass-panel" style="padding: 2.5rem 0;">
                <h3 style="padding: 0 2.5rem;">Contenido Gestionado</h3>
                <ul id="stories-list" class="item-list" style="padding: 0 1.25rem;">
                    <!-- Se llena con JS -->
                </ul>
            </div>
        </div>
    </div>

    <footer>
        <p>MUSARAÑA — GESTIÓN INTEGRAL DE MUSEOS © <span id="admin-year">2026</span></p>
    </footer>

    <script type="module" src="/js/admin.js"></script>
</body>
</html>
