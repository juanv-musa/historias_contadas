<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor | Historias Contadas</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/styles.css">
    
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- QRCode JS CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        .admin-container {
            max-width: 900px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2.5rem;
            color: var(--text-primary);
            margin: 2rem auto;
        }

        .admin-view {
            transition: opacity 0.3s;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .btn {
            background: var(--brand-color);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-danger {
            background: #ef4444;
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .form-control {
            width: 100%;
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: rgba(0,0,0,0.2);
            color: white;
            font-family: inherit;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        /* Lists */
        .item-list {
            list-style: none;
        }

        .item-card {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border: 1px solid transparent;
            transition: border-color 0.2s;
        }
        
        .item-card:hover {
            border-color: var(--brand-color);
        }
        
        .project-color-preview {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: inline-block;
            vertical-align: middle;
            margin-left: 10px;
        }
    </style>
</head>
<body>

    <!-- Ventana de Login -->
    <div id="login-view" class="admin-container admin-view">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2>Iniciar Sesión</h2>
            <p class="subtitle">Accede al gestor Multicliente</p>
        </div>
        <form id="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" class="form-control" required placeholder="admin@empresa.com">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn" style="width: 100%;">Entrar</button>
            <p id="auth-error" style="color: #ef4444; margin-top:1rem; text-align:center;" class="hidden">Credenciales incorrectas.</p>
        </form>
    </div>

    <!-- Vista: Lista de Proyectos (Clientes) -->
    <div id="projects-view" class="admin-container admin-view hidden">
        <header class="admin-header">
            <h2>Gestor de Proyectos</h2>
            <button id="btn-logout" class="btn btn-danger">Cerrar Sesión</button>
        </header>

        <form id="create-project-form" style="margin-bottom: 2rem; background: rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 12px;">
            <h3>Crear Nuevo Proyecto</h3>
            <div style="display:flex; gap: 1rem; margin-top: 1rem; align-items: flex-end;">
                <div class="form-group" style="flex:1; margin-bottom: 0;">
                    <label>Nombre del Cliente / Proyecto</label>
                    <input type="text" id="new-project-name" class="form-control" required>
                </div>
                <button type="submit" class="btn" id="btn-create-project">Crear Proyecto</button>
            </div>
        </form>

        <h3>Proyectos Activos</h3>
        <hr style="border-color: var(--border-color); margin: 0.5rem 0 1rem;">
        <ul id="projects-list" class="item-list">
            <li style="text-align: center;">Cargando proyectos...</li>
        </ul>
    </div>

    <!-- Vista: Detalle del Proyecto (Historias y Marca) -->
    <div id="project-detail-view" class="admin-container admin-view hidden">
        <header class="admin-header">
            <div style="display:flex; align-items:center; gap: 1rem;">
                <button id="btn-back-projects" class="btn btn-outline">← Volver</button>
                <h2 id="current-project-title">Cargando Proyecto...</h2>
            </div>
        </header>

        <div class="grid-2">
            <!-- Columna Izquierda: Configuración Marca -->
            <div>
                <h3>Configuración de Marca</h3>
                <hr style="border-color: var(--border-color); margin: 0.5rem 0 1rem;">
                <form id="brand-form">
                    <div class="form-group">
                        <label>Nombre Público</label>
                        <input type="text" id="client-name-input" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Color Principal (Botones/Detalles)</label>
                        <input type="color" id="client-color-input" class="form-control" style="height: 50px;">
                    </div>
                    <div class="form-group">
                        <label>Color de Fondo (Atmósfera)</label>
                        <input type="color" id="client-bg-input" class="form-control" style="height: 50px;" value="#0f172a">
                    </div>
                    <div class="form-group">
                        <label>Subir Logo Principal (PNG/JPG)</label>
                        <input type="file" id="client-logo-input" class="form-control" accept="image/*">
                    </div>
                    <img id="logo-preview" class="hidden" style="max-height: 50px; margin-bottom: 1rem; background: white; padding: 5px; border-radius: 4px;" />
                    
                    <div class="form-group">
                        <label>Logos de Pie (Sponsors/Patrocinadores)</label>
                        <input type="file" id="footer-logos-input" class="form-control" accept="image/*">
                    </div>
                    <img id="footer-logos-preview" class="hidden" style="max-height: 40px; margin-bottom: 1rem; background: white; padding: 5px; border-radius: 4px;" />

                    <button type="submit" id="btn-save-brand" class="btn">Guardar Marca</button>
                </form>
            </div>

            <!-- Columna Derecha: Nueva Historia -->
            <div>
                <h3>Subir Nueva Historia</h3>
                <hr style="border-color: var(--border-color); margin: 0.5rem 0 1rem;">
                <form id="story-form">
                    <div class="form-group">
                        <label>Título de la Historia (Español)</label>
                        <input type="text" id="story-title-input" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Título de la Historia (Inglés)</label>
                        <input type="text" id="story-title-en-input" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Slug / ID Personalizado (opcional, ej: castellar01)</label>
                        <input type="text" id="story-slug-input" class="form-control" placeholder="Si ya tienes QRs impresos...">
                    </div>
                    <div class="form-group">
                        <label>Foto de la Historia (JPG/PNG)</label>
                        <input type="file" id="story-image-input" class="form-control" accept="image/*">
                    </div>
                    <div class="form-group">
                        <label>Audio Español (MP3)</label>
                        <input type="file" id="story-es-input" class="form-control" accept="audio/*">
                    </div>
                    <div class="form-group">
                        <label>Audio Inglés (MP3)</label>
                        <input type="file" id="story-en-input" class="form-control" accept="audio/*">
                    </div>
                    <div class="form-group">
                        <label>Transcripción Español</label>
                        <textarea id="story-transcription-es" class="form-control" rows="4" placeholder="Texto de la historia en español..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Transcripción Inglés</label>
                        <textarea id="story-transcription-en" class="form-control" rows="4" placeholder="Story text in English..."></textarea>
                    </div>
                    <button type="submit" id="btn-upload-story" class="btn">Subir Historia</button>
                </form>
            </div>
        </div>

        <!-- Lista de Historias Activas -->
        <div style="margin-top: 3rem;">
            <h3>Historias de este Proyecto</h3>
            <hr style="border-color: var(--border-color); margin: 0.5rem 0;">
            <ul id="stories-list" class="item-list">
                <!-- Se llenará dinámicamente -->
                <li style="text-align: center; color: var(--text-secondary);">Cargando...</li>
            </ul>
        </div>
    </div>

    <script type="module" src="/js/admin.js"></script>
</body>
</html>
